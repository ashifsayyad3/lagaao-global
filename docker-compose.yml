version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: lagaao_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: lagaao
      MYSQL_USER: lagaao_user
      MYSQL_PASSWORD: changeme
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lagaao_net

  redis:
    image: redis:7-alpine
    container_name: lagaao_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - lagaao_net

  # Uncomment for local Elasticsearch
  # elasticsearch:
  #   image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
  #   container_name: lagaao_elastic
  #   environment:
  #     - discovery.type=single-node
  #     - xpack.security.enabled=false
  #   ports:
  #     - '9200:9200'
  #   volumes:
  #     - elastic_data:/usr/share/elasticsearch/data
  #   networks:
  #     - lagaao_net

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: lagaao_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      - mysql
      - redis
    networks:
      - lagaao_net

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: lagaao_frontend
    restart: unless-stopped
    ports:
      - '4200:4200'
    networks:
      - lagaao_net

volumes:
  mysql_data:
  redis_data:
  # elastic_data:

networks:
  lagaao_net:
    driver: bridge
