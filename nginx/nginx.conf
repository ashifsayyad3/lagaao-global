worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ─── Logging ──────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # ─── Performance ──────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 10m;

  # ─── Gzip ─────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/rss+xml application/atom+xml
    image/svg+xml font/ttf font/otf font/woff font/woff2;

  # ─── Proxy cache ──────────────────────────────────────────
  proxy_cache_path /var/cache/nginx levels=1:2
                   keys_zone=api_cache:10m max_size=100m
                   inactive=60m use_temp_path=off;

  # ─── Security headers ─────────────────────────────────────
  add_header X-Frame-Options           "DENY"                        always;
  add_header X-Content-Type-Options    "nosniff"                     always;
  add_header X-XSS-Protection          "1; mode=block"               always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "camera=(),microphone=(),geolocation=()" always;

  # ─── Rate limiting ────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=2r/s;

  # ─── HTTP → HTTPS redirect ────────────────────────────────
  server {
    listen 80;
    server_name lagaao.com www.lagaao.com;
    return 301 https://$host$request_uri;
  }

  # ─── Main HTTPS server ────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name lagaao.com www.lagaao.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    limit_req zone=general burst=50 nodelay;

    # ─── Static assets (Angular browser build) ──────────────
    location ~* \.(js|css|woff2?|ttf|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
      proxy_pass         http://frontend:4200;
      proxy_cache        api_cache;
      proxy_cache_valid  200 7d;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      add_header Cache-Control "public, max-age=604800, immutable";
      add_header X-Cache-Status $upstream_cache_status;
    }

    # ─── API routes → backend ─────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;

      proxy_pass         http://backend:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;

      # Cache safe GET API responses briefly
      proxy_cache        api_cache;
      proxy_cache_methods GET;
      proxy_cache_valid  200 30s;
      proxy_cache_key    "$scheme$request_method$host$request_uri$http_authorization";
      proxy_no_cache     $http_authorization;
      proxy_cache_bypass $http_authorization;
      add_header X-Cache-Status $upstream_cache_status;
    }

    # ─── Auth routes — strict rate limit, no cache ────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass       http://backend:3000;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_no_cache   1;
      proxy_cache_bypass 1;
    }

    # ─── Health check (no auth) ───────────────────────────
    location /health {
      proxy_pass http://backend:3000/health;
      access_log off;
    }

    # ─── WebSocket (Socket.IO) ────────────────────────────
    location /socket.io/ {
      proxy_pass         http://backend:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }

    # ─── All other routes → Angular SSR ──────────────────
    location / {
      proxy_pass         http://frontend:4200;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
